# Task 1: cleanup
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  description: Clean up workspace by deleting all files
  workspaces:
    - name: source
  steps:
    - name: remove
      image: alpine:3
      env:
        - name: WORKSPACE_SOURCE_PATH
          value: $(workspaces.source.path)
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      script: |
        #!/usr/bin/env sh
        set -eu
        echo "Removing all files from ${WORKSPACE_SOURCE_PATH} ..."
        if [ -d "${WORKSPACE_SOURCE_PATH}" ] ; then
          rm -rf "${WORKSPACE_SOURCE_PATH:?}"/*
          rm -rf "${WORKSPACE_SOURCE_PATH}"/.[!.]*
          rm -rf "${WORKSPACE_SOURCE_PATH}"/..?*
        fi
---
# Task 2: git-clone
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-clone
spec:
  description: Clone git repository
  workspaces:
    - name: output
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
  steps:
    - name: clone
      image: alpine/git:latest
      workingDir: $(workspaces.output.path)
      script: |
        #!/bin/sh
        git config --global --add safe.directory $(workspaces.output.path)
        git clone $(params.url) .
        git checkout $(params.revision)
---
# Task 3: flake8
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: flake8
spec:
  workspaces:
    - name: source
  steps:
    - name: lint
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --max-complexity=10 --max-line-length=127 --statistics
---
# Task 4: nose
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose
spec:
  workspaces:
    - name: source
  steps:
    - name: test
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        pip install --upgrade pip
        pip install nose coverage
        # Install dependencies from requirements.txt if exists
        if [ -f "requirements.txt" ]; then
          pip install -r requirements.txt
        fi
        # Run tests (using nosetests or fallback to unittest)
        if command -v nosetests &> /dev/null; then
          nosetests -v --with-coverage --cover-package=app
        else
          python -m unittest discover -v
        fi
---
# Task 5: buildah
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildah
spec:
  workspaces:
    - name: source
  params:
    - name: IMAGE
      type: string
  steps:
    - name: build
      image: quay.io/buildah/stable
      workingDir: $(workspaces.source.path)
      # Hapus securityContext yang memerlukan privileged
      script: |
        #!/bin/bash
        # Use vfs driver (doesn't require privileged)
        buildah bud --storage-driver=vfs -t $(params.IMAGE) .
        # Push image
        buildah push --storage-driver=vfs $(params.IMAGE)
---
# Task 6: openshift-client
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: openshift-client
spec:
  params:
    - name: SCRIPT
      type: string
  steps:
    - name: oc
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/sh
        $(params.SCRIPT)