apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: ci-pipeline
spec:
  workspaces:
    - name: output
  params:
    - name: app-name
      type: string
      default: my-app
    - name: build-image
      type: string
      default: image-registry.openshift-image-registry.svc:5000/$(context.pipelineRun.namespace)/my-app:latest
  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    - name: git-clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: https://github.com/AbdKhlm/ci-cd-final-project.git
        - name: revision
          value: main
      workspaces:
        - name: output
          workspace: output
      runAfter:
        - cleanup

    - name: flake8-lint
      taskRef:
        name: flake8
      workspaces:
        - name: source
          workspace: output
      runAfter:
        - git-clone

    - name: nose-tests
      taskRef:
        name: nose
      workspaces:
        - name: source
          workspace: output
      runAfter:
        - flake8-lint

    - name: buildah
      taskRef:
        name: buildah
      params:
        - name: IMAGE
          value: $(params.build-image)
      workspaces:
        - name: source
          workspace: output
      runAfter:
        - nose-tests

    - name: deploy
      taskRef:
        name: openshift-client
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) --image=$(params.build-image) --dry-run=client -o yaml | oc apply -f -
      runAfter:
        - buildah
